name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify submodule
        shell: pwsh
        run: |
          if (!(Test-Path "third_party/SuperTimecodeConverter/TimecodeCore.h")) {
            throw "Submodule missing: third_party/SuperTimecodeConverter"
          }

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build Release
        run: cmake --build --preset windows-msvc-release

      - name: Package
        shell: pwsh
        run: |
          $exe = "build/windows-msvc/EasyTrigger_artefacts/Release/Easy Trigger v2.exe"
          if (!(Test-Path $exe)) { throw "Release exe not found: $exe" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $exe -DestinationPath "dist/EasyTrigger-win64.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytrigger-win64
          path: dist/EasyTrigger-win64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify submodule
        run: test -f third_party/SuperTimecodeConverter/TimecodeCore.h || (echo "Submodule missing" && exit 1)

      - name: Configure
        run: cmake --preset macos-universal

      - name: Build Release
        run: cmake --build --preset macos-universal-release

      - name: Package
        run: |
          APP_PATH=$(find build/macos-universal -type d -name "Easy Bridge.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Easy Bridge.app not found" && exit 1
          fi
          VERSION=$(grep -m1 'project(.*VERSION' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          VOLNAME="Easy Bridge ${VERSION}"
          STAGING=$(mktemp -d)
          cp -R "$APP_PATH"    "$STAGING/Easy Bridge.app"
          ln -sf /Applications "$STAGING/Applications"
          mkdir -p Installer
          DMG_RW="Installer/EasyBridge-${VERSION}-rw.dmg"
          DMG_PATH="Installer/EasyBridge-${VERSION}.dmg"
          hdiutil create -volname "$VOLNAME" -srcfolder "$STAGING" -ov -format UDRW "$DMG_RW"
          rm -rf "$STAGING"
          hdiutil attach "$DMG_RW" -readwrite -nobrowse > /dev/null
          MOUNT="/Volumes/${VOLNAME}"
          cp "Icons/Icon Bridge.icns" "$MOUNT/.VolumeIcon.icns"
          xcrun SetFile -a V "$MOUNT/.VolumeIcon.icns" 2>/dev/null || true
          python3 - "$MOUNT" <<'PYEOF'
import struct, subprocess, sys
path = sys.argv[1]
r = subprocess.run(['xattr', '-px', 'com.apple.FinderInfo', path], capture_output=True, text=True)
fi = bytearray.fromhex(r.stdout.strip().replace(' ', '').replace('\n', '')) if r.returncode == 0 and r.stdout.strip() else bytearray(32)
while len(fi) < 32: fi.append(0)
flags = struct.unpack('>H', fi[8:10])[0] | 0x0400
struct.pack_into('>H', fi, 8, flags)
subprocess.run(['xattr', '-wx', 'com.apple.FinderInfo', ' '.join(f'{b:02x}' for b in fi), path], check=True)
PYEOF
          hdiutil eject "$MOUNT" -quiet
          hdiutil convert "$DMG_RW" -ov -format UDZO -o "$DMG_PATH"
          rm -f "$DMG_RW"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easybridge-macos-universal
          path: Installer/EasyBridge-*.dmg

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/easytrigger-win64/EasyTrigger-win64.zip
            dist/easybridge-macos-universal/EasyBridge-*.dmg

          generate_release_notes: true
