name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake --preset windows-msvc

      - name: Build Release
        run: cmake --build --preset windows-msvc-release

      - name: Build Installer
        shell: pwsh
        run: |
          $exe = "build/windows-msvc/EasyBridge_artefacts/Release/Easy Bridge.exe"
          if (!(Test-Path $exe)) { throw "Release exe not found: $exe" }
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "Inno Setup not found: $iscc" }
          & $iscc installer_bridge.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easybridge-win64
          path: Installer/EasyBridge_Setup_*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake --preset macos-universal

      - name: Build Release
        run: cmake --build --preset macos-universal-release

      - name: Package
        run: |
          set -euo pipefail
          APP_PATH=$(find build/macos-universal -type d -name "Easy Bridge.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Easy Bridge.app not found in build/macos-universal"
            find build/macos-universal -name "*.app" || true
            exit 1
          fi
          echo "Found app: $APP_PATH"
          VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' version.iss | head -1)
          echo "Version: $VERSION"
          VOLNAME="Easy Bridge ${VERSION}"
          STAGING=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING/Easy Bridge.app"
          ln -sf /Applications "$STAGING/Applications"
          mkdir -p Installer
          DMG_RW="Installer/EasyBridge-${VERSION}-rw.dmg"
          DMG_PATH="Installer/EasyBridge-${VERSION}.dmg"
          hdiutil create -volname "$VOLNAME" -srcfolder "$STAGING" -ov -format UDRW "$DMG_RW"
          rm -rf "$STAGING"
          MOUNT_OUTPUT=$(hdiutil attach "$DMG_RW" -readwrite -nobrowse)
          echo "Attached: $MOUNT_OUTPUT"
          sleep 2
          MOUNT="/Volumes/${VOLNAME}"
          if [ ! -d "$MOUNT" ]; then
            echo "ERROR: Volume not mounted at $MOUNT"
            ls /Volumes/
            exit 1
          fi
          cp "Icons/Icon Bridge.icns" "$MOUNT/.VolumeIcon.icns" || true
          xcrun SetFile -a V "$MOUNT/.VolumeIcon.icns" 2>/dev/null || true
          python3 cmake/set_dmg_icon.py "$MOUNT" || true
          hdiutil detach "$MOUNT" -quiet
          hdiutil convert "$DMG_RW" -ov -format UDZO -o "$DMG_PATH"
          rm -f "$DMG_RW"
          echo "DMG ready: $DMG_PATH"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: easybridge-macos-universal
          path: Installer/EasyBridge-*.dmg

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/easybridge-win64/EasyBridge_Setup_*.exe
            dist/easybridge-macos-universal/EasyBridge-*.dmg

          generate_release_notes: true
